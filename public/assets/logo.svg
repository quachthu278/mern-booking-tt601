<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="orangeTrail" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7b00" />
      <stop offset="100%" stop-color="#ffaa00" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Left Side: Compass and Airplane -->
  <g transform="translate(180, 150)">
    <!-- Compass Background -->
    <circle cx="0" cy="0" r="75" fill="#f8f9fa"/>
    
    <!-- Compass Rings -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#0a2a5e" stroke-width="5"/>
    <circle cx="0" cy="0" r="58" fill="none" stroke="#0a2a5e" stroke-width="2"/>
    <circle cx="0" cy="0" r="82" fill="none" stroke="#0a2a5e" stroke-width="1.5" stroke-dasharray="5, 5"/>
    
    <!-- Outer marks -->
    <path d="M 0 -82 L 0 -76 M 0 82 L 0 76 M -82 0 L -76 0 M 82 0 L 76 0" stroke="#0a2a5e" stroke-width="2"/>

    <!-- Compass Stars/Points (4 thick ones) -->
    <!-- North -->
    <path d="M 0 -58 L 12 -12 L 0 0 Z" fill="#0a2a5e"/>
    <path d="M 0 -58 L -12 -12 L 0 0 Z" fill="#2d6ef5"/>
    <!-- South -->
    <path d="M 0 58 L 12 12 L 0 0 Z" fill="#0a2a5e"/>
    <path d="M 0 58 L -12 12 L 0 0 Z" fill="#2d6ef5"/>
    <!-- East -->
    <path d="M 58 0 L 12 -12 L 0 0 Z" fill="#0a2a5e"/>
    <path d="M 58 0 L 12 12 L 0 0 Z" fill="#2d6ef5"/>
    <!-- West -->
    <path d="M -58 0 L -12 -12 L 0 0 Z" fill="#0a2a5e"/>
    <path d="M -58 0 L -12 12 L 0 0 Z" fill="#2d6ef5"/>

    <!-- Corner Points (4 thin ones) -->
    <!-- NE -->
    <path d="M 40 -40 L 8 -8 L 0 0 Z" fill="#0a2a5e"/>
    <path d="M 40 -40 L 12 -4 L 0 0 Z" fill="#2d6ef5"/>
    <!-- SE -->
    <path d="M 40 40 L 8 8 L 0 0 Z" fill="#0a2a5e"/>
    <path d="M 40 40 L 12 4 L 0 0 Z" fill="#2d6ef5"/>
    <!-- SW -->
    <path d="M -40 40 L -8 8 L 0 0 Z" fill="#0a2a5e"/>
    <path d="M -40 40 L -12 4 L 0 0 Z" fill="#2d6ef5"/>
    <!-- NW -->
    <path d="M -40 -40 L -8 -8 L 0 0 Z" fill="#0a2a5e"/>
    <path d="M -40 -40 L -12 -4 L 0 0 Z" fill="#2d6ef5"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#f8f9fa" stroke="#0a2a5e" stroke-width="2"/>

    <!-- N E S W -->
    <text x="-8" y="-90" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="20" fill="#0a2a5e">N</text>
    <text x="-7" y="105" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="20" fill="#0a2a5e">S</text>
    <text x="90" y="7" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="20" fill="#0a2a5e">E</text>
    <text x="-110" y="7" font-family="'Segoe UI', Arial, sans-serif" font-weight="900" font-size="20" fill="#0a2a5e">W</text>

    <!-- Orange Swoosh Trail -->
    <!-- We want it curving from bottom left, sweeping up and right, getting wider or just constant width -->
    <path d="M -70 70 A 180 180 0 0 1 120 -75" fill="none" stroke="url(#orangeTrail)" stroke-width="15" stroke-linecap="round" filter="url(#shadow)"/>
    
    <!-- Another thin trail inside for detail -->
    <path d="M -50 63 A 160 160 0 0 1 110 -68" fill="none" stroke="#fff" stroke-width="3" opacity="0.6"/>

    <!-- Airplane -->
    <g transform="translate(130, -80) rotate(15) scale(0.65)" filter="url(#shadow)">
      <!-- Main body -->
      <path d="M 50 -10 L 0 -10 L -30 -35 L -45 -35 L -20 -10 L -45 -10 L -60 -20 L -70 -20 L -60 0 L -70 20 L -60 20 L -45 10 L -20 10 L -45 35 L -30 35 L 0 10 L 50 10 Q 75 10 75 0 Q 75 -10 50 -10 Z" fill="#0a2a5e"/>
      <!-- Window line -->
      <path d="M 50 -2 L -10 -2" stroke="#ffffff" stroke-width="3" stroke-dasharray="4, 5"/>
      <path d="M 68 0 L 60 0" stroke="#ffffff" stroke-width="2"/>
    </g>
  </g>

  <!-- Right Side: Text Group -->
  <g transform="translate(320, 75)">
    <!-- HTCT Large Text -->
    <text x="0" y="55" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-weight="900" font-size="88" fill="#0a2a5e" letter-spacing="-1">HTCT</text>
    
    <!-- Booking block container -->
    <g transform="translate(0, 70)">
      <!-- Base blue block behind Booking -->
      <rect x="0" y="0" width="280" height="52" rx="4" fill="#0a2a5e" />
      <text x="20" y="38" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="34" fill="#ffffff" letter-spacing="1">Booking</text>
    </g>
    
    <!-- GLOBAL TRAVEL AGENCY -->
    <text x="10" y="150" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="18" fill="#0a2a5e" letter-spacing="2">GLOBAL TRAVEL AGENCY</text>
  </g>
</svg>
